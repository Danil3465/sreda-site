<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Среда — профиль секции</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F0F4F0;
            color: #1A2A1A;
            line-height: 1.4;
        }

        :root {
            --primary: #4CAF7F;
            --primary-dark: #3d8c64;
            --primary-light: #e2f3ea;
            --primary-ultralight: #f0faf5;
            --gray-bg: #F7F9F7;
            --gray-card: #FFFFFF;
            --text-dark: #1A2A1A;
            --text-gray: #5E6E5E;
            --border-light: #DEE6DE;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.05);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            background: white;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
        }

        .nav {
            display: flex;
            gap: 28px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            border: 1px solid var(--border-light);
            padding: 8px 18px;
            border-radius: 40px;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .btn-max {
            background: #1A73E8;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        /* Карточка секции */
        .section-profile {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .section-info-card {
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            text-align: center;
            height: fit-content;
        }

        .section-avatar {
            width: 120px;
            height: 120px;
            background: var(--primary-light);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 3rem;
            color: var(--primary);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .section-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 0.7rem;
            padding: 4px;
            text-align: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .section-avatar:hover .avatar-upload-label {
            opacity: 1;
        }

        .section-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 12px 0 8px;
        }

        .trainer-name {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .rating {
            margin-bottom: 20px;
            color: #ffb800;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            text-align: left;
        }

        .info-row .edit-icon {
            color: #9e9e9e;
            cursor: pointer;
            font-size: 0.7rem;
            transition: color 0.2s;
            margin-right: 8px;
        }

        .info-row .edit-icon:hover {
            color: var(--primary);
        }

        .info-row .info-label {
            font-size: 0.8rem;
            color: var(--text-gray);
            min-width: 70px;
        }

        .info-row .info-value {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-dark);
        }

        .info-edit-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .edit-actions {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .edit-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 4px 6px;
            border-radius: 6px;
            color: #9e9e9e;
        }

        .chat-card {
            background: var(--primary-ultralight);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin: 16px 0;
        }

        .groups-widget {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        .widget-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .group-item .edit-icon {
            color: #9e9e9e;
            cursor: pointer;
            font-size: 0.7rem;
            margin-right: 8px;
        }

        .group-age {
            font-weight: 600;
            min-width: 140px;
            font-size: 0.85rem;
        }

        .group-schedule {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .group-price {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.85rem;
            min-width: 80px;
            text-align: right;
        }

        .add-group {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .add-group input {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .btn-small {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .review-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .review-avatar {
            width: 36px;
            height: 36px;
            background: var(--gray-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 1rem;
        }

        .footer {
            border-top: 1px solid var(--border-light);
            padding: 40px 0 32px;
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .footer-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--text-gray);
        }

        @media (max-width: 900px) {
            .section-profile { grid-template-columns: 1fr; }
            .container { padding: 0 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="header-inner">
            <div class="logo" onclick="window.location.href='/'">Среда</div>
            <div class="nav">
                <a href="#">Сообщества</a>
                <a href="#">Секции</a>
                <div id="authSection">
                    <a href="#" id="loginBtn" class="btn-outline">Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>

<main>
    <div class="container" id="sectionContainer">
        <div class="loading" style="text-align: center; padding: 60px;">Загрузка секции...</div>
    </div>
</main>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Вход</h3>
        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <div id="modalError" style="color: red; font-size: 0.8rem; margin: 8px 0;"></div>
        <button id="modalActionBtn" class="btn-primary" style="width: 100%;">Войти</button>
        <div style="text-align: center; margin-top: 16px;">
            <a href="#" id="switchAuthMode">Нет аккаунта? Зарегистрироваться</a>
        </div>
        <button id="closeModal" style="margin-top: 12px; background: none; border: none; cursor: pointer; color: var(--text-gray);">Закрыть</button>
    </div>
</div>

<footer class="container">
    <div class="footer">
        <div>Среда — найди своих по интересам</div>
        <div class="footer-links">
            <a href="#">О проекте</a>
            <a href="#">Контакты</a>
            <a href="#">Для тренеров</a>
            <a href="#">Пользовательское соглашение</a>
        </div>
        <div>© 2026 Среда</div>
    </div>
</footer>

<script>
    const SUPABASE_URL = 'https://zweulqmupkljowyfwzqs.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_CQDuw-BNAqeYUTr8HyzaoQ_JTw_Qv05';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let currentSection = null;
    let isLoginMode = true;
    let editingField = null;
    let editingGroupId = null;

    // Параметр sectionId из URL (для демо используем id=1)
    const sectionId = 1;
    
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            currentUser = session.user;
            updateAuthUI(true);
        } else {
            currentUser = null;
            updateAuthUI(false);
        }
        loadSection();
    }

    async function loadSection() {
        const { data: section, error } = await supabaseClient
            .from('sections')
            .select('*')
            .eq('id', sectionId)
            .single();
        
        if (error || !section) {
            document.getElementById('sectionContainer').innerHTML = '<div class="loading">Ошибка загрузки секции</div>';
            return;
        }
        
        currentSection = section;
        
        // Загружаем группы
        const { data: groups } = await supabaseClient
            .from('section_groups')
            .select('*')
            .eq('section_id', sectionId)
            .order('age_min', { ascending: true });
        
        currentSection.groups = groups || [];
        
        renderSection();
    }

    async function updateSectionField(field, value) {
        if (!currentSection) return false;
        const updateData = {};
        updateData[field] = value;
        const { error } = await supabaseClient
            .from('sections')
            .update(updateData)
            .eq('id', sectionId);
        if (error) {
            console.error('Ошибка обновления:', error);
            alert('Ошибка сохранения: ' + error.message);
            return false;
        }
        currentSection[field] = value;
        return true;
    }

    async function updateGroupField(groupId, field, value) {
        const { error } = await supabaseClient
            .from('section_groups')
            .update({ [field]: value })
            .eq('id', groupId);
        if (error) {
            console.error('Ошибка обновления группы:', error);
            alert('Ошибка сохранения: ' + error.message);
            return false;
        }
        const group = currentSection.groups.find(g => g.id === groupId);
        if (group) group[field] = value;
        return true;
    }

    async function addGroup() {
        const ageMin = prompt('Минимальный возраст:');
        const ageMax = prompt('Максимальный возраст:');
        const schedule = prompt('Расписание (например: Пн/Ср 19:00):');
        const price = prompt('Цена в месяц (руб):');
        
        if (!ageMin && !schedule) return;
        
        const { data, error } = await supabaseClient
            .from('section_groups')
            .insert([{
                section_id: sectionId,
                age_min: parseInt(ageMin) || null,
                age_max: parseInt(ageMax) || null,
                schedule: schedule || '',
                price: parseInt(price) || 0,
                group_type: 'adult'
            }])
            .select()
            .single();
        
        if (error) {
            alert('Ошибка добавления: ' + error.message);
        } else {
            currentSection.groups.push(data);
            renderSection();
        }
    }

    async function deleteGroup(groupId) {
        if (!confirm('Удалить группу?')) return;
        const { error } = await supabaseClient
            .from('section_groups')
            .delete()
            .eq('id', groupId);
        if (error) {
            alert('Ошибка удаления: ' + error.message);
        } else {
            currentSection.groups = currentSection.groups.filter(g => g.id !== groupId);
            renderSection();
        }
    }

    function startEditField(field, currentValue) {
        if (editingField !== null) return;
        editingField = field;
        const row = document.getElementById(`row-${field}`);
        if (!row) return;
        const valueSpan = row.querySelector('.info-value');
        const editIcon = row.querySelector('.edit-icon');
        
        const input = document.createElement('input');
        input.type = 'text';
        input.value = currentValue || '';
        input.className = 'info-edit-input';
        
        const saveBtn = document.createElement('button');
        saveBtn.innerHTML = '<i class="fas fa-check"></i>';
        const cancelBtn = document.createElement('button');
        cancelBtn.innerHTML = '<i class="fas fa-times"></i>';
        
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'edit-actions';
        actionsDiv.appendChild(saveBtn);
        actionsDiv.appendChild(cancelBtn);
        
        valueSpan.style.display = 'none';
        editIcon.style.display = 'none';
        
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.alignItems = 'center';
        container.style.flex = '1';
        container.appendChild(input);
        container.appendChild(actionsDiv);
        
        row.appendChild(container);
        
        input.focus();
        
        const saveHandler = async () => {
            const newValue = input.value.trim();
            if (newValue !== currentValue) {
                await updateSectionField(field, newValue);
            }
            editingField = null;
            renderSection();
        };
        
        const cancelHandler = () => {
            editingField = null;
            renderSection();
        };
        
        saveBtn.onclick = saveHandler;
        cancelBtn.onclick = cancelHandler;
        input.onkeypress = (e) => { if (e.key === 'Enter') saveHandler(); };
    }

    function startEditGroup(groupId, field, currentValue) {
        if (editingGroupId !== null) return;
        editingGroupId = groupId;
        const groupDiv = document.getElementById(`group-${groupId}-${field}`);
        if (!groupDiv) return;
        const span = groupDiv.querySelector('.group-value');
        const editIcon = groupDiv.querySelector('.edit-icon');
        
        const input = document.createElement('input');
        input.type = field === 'price' ? 'number' : 'text';
        input.value = currentValue || '';
        input.style.padding = '4px 8px';
        input.style.border = '1px solid var(--border-light)';
        input.style.borderRadius = '12px';
        input.style.fontSize = '0.8rem';
        input.style.width = '120px';
        
        const saveBtn = document.createElement('button');
        saveBtn.innerHTML = '<i class="fas fa-check"></i>';
        const cancelBtn = document.createElement('button');
        cancelBtn.innerHTML = '<i class="fas fa-times"></i>';
        
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'edit-actions';
        actionsDiv.appendChild(saveBtn);
        actionsDiv.appendChild(cancelBtn);
        
        span.style.display = 'none';
        editIcon.style.display = 'none';
        
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.alignItems = 'center';
        container.style.gap = '6px';
        container.appendChild(input);
        container.appendChild(actionsDiv);
        
        groupDiv.appendChild(container);
        
        input.focus();
        
        const saveHandler = async () => {
            let newValue = input.value.trim();
            if (field === 'price') newValue = parseInt(newValue) || 0;
            if (newValue != currentValue) {
                await updateGroupField(groupId, field, newValue);
            }
            editingGroupId = null;
            renderSection();
        };
        
        const cancelHandler = () => {
            editingGroupId = null;
            renderSection();
        };
        
        saveBtn.onclick = saveHandler;
        cancelBtn.onclick = cancelHandler;
        input.onkeypress = (e) => { if (e.key === 'Enter') saveHandler(); };
    }

    async function updateSectionAvatar(file) {
        if (!file || !currentUser) {
            alert('Войдите, чтобы изменить аватар');
            openModal();
            return;
        }
        const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/heic', 'image/heif', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
            alert('Поддерживаются форматы: JPEG, PNG, HEIC, WEBP');
            return;
        }
        if (file.size > 5 * 1024 * 1024) {
            alert('Файл не должен превышать 5MB');
            return;
        }
        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `section_${sectionId}_${Date.now()}.${fileExt}`;
            const { error: uploadError } = await supabaseClient.storage
                .from('section-avatars')
                .upload(fileName, file);
            if (uploadError) throw uploadError;
            const { data: { publicUrl } } = supabaseClient.storage
                .from('section-avatars')
                .getPublicUrl(fileName);
            await updateSectionField('cover_image', publicUrl);
            renderSection();
            alert('Аватар обновлён!');
        } catch (error) {
            console.error('Ошибка загрузки аватара:', error);
            alert('Ошибка при загрузке аватара.');
        }
    }

    function renderSection() {
        if (!currentSection) return;
        
        const groups = currentSection.groups || [];
        
        const container = document.getElementById('sectionContainer');
        container.innerHTML = `
            <div class="section-profile">
                <div class="section-info-card">
                    <div class="section-avatar" id="avatarContainer">
                        ${currentSection.cover_image ? 
                            `<img src="${currentSection.cover_image}" alt="avatar">` : 
                            '<i class="fas fa-fist-raised" style="font-size: 3rem;"></i>'
                        }
                        <div class="avatar-upload-label" onclick="document.getElementById('avatarInput').click()">
                            <i class="fas fa-camera"></i> Изменить
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/jpeg,image/jpg,image/png,image/heic,image/heif,image/webp" style="display:none">
                    
                    <div class="section-name">${escapeHtml(currentSection.name || 'Без названия')}</div>
                    <div class="trainer-name">${escapeHtml(currentSection.trainer_name || 'Тренер не указан')}</div>
                    <div class="rating">${currentSection.rating ? '⭐ ' + currentSection.rating : '⭐ 0.0'}</div>
                    
                    <div id="row-address" class="info-row">
                        <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('address', '${escapeHtml(currentSection.address || '').replace(/'/g, "\\'")}')"></i>
                        <span class="info-label">Адрес</span>
                        <span class="info-value">${escapeHtml(currentSection.address || 'Не указан')}</span>
                    </div>
                    <div id="row-metro" class="info-row">
                        <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('metro', '${escapeHtml(currentSection.metro || '').replace(/'/g, "\\'")}')"></i>
                        <span class="info-label">Метро</span>
                        <span class="info-value">${escapeHtml(currentSection.metro || 'Не указано')}</span>
                    </div>
                    <div id="row-phone" class="info-row">
                        <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('phone', '${escapeHtml(currentSection.phone || '').replace(/'/g, "\\'")}')"></i>
                        <span class="info-label">Телефон</span>
                        <span class="info-value">${escapeHtml(currentSection.phone || 'Не указан')}</span>
                    </div>
                    <div id="row-email" class="info-row">
                        <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('email', '${escapeHtml(currentSection.email || '').replace(/'/g, "\\'")}')"></i>
                        <span class="info-label">Email</span>
                        <span class="info-value">${escapeHtml(currentSection.email || 'Не указан')}</span>
                    </div>
                    <div id="row-website" class="info-row">
                        <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('website', '${escapeHtml(currentSection.website || '').replace(/'/g, "\\'")}')"></i>
                        <span class="info-label">Сайт</span>
                        <span class="info-value">${escapeHtml(currentSection.website || 'Не указан')}</span>
                    </div>
                    
                    <div class="chat-card">
                        <i class="fab fa-telegram-plane" style="font-size: 1.5rem; color: #1A73E8;"></i>
                        <div style="font-weight: 600; margin: 8px 0;">Чат в MAX</div>
                        <div style="font-size: 0.7rem;">Обсуждайте тренировки с участниками</div>
                        <a href="${currentSection.max_chat_link || '#'}" target="_blank" class="btn-primary" style="margin-top: 12px; display: inline-block;">Вступить в чат →</a>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label"></span>
                        <span class="info-value"></span>
                    </div>
                </div>
                
                <div>
                    <div class="groups-widget">
                        <div class="widget-title">Группы и расписание</div>
                        <div id="groupsContainer"></div>
                        <div class="add-group">
                            <button class="btn-small" onclick="window.addGroup()">+ Добавить группу</button>
                        </div>
                    </div>
                    
                    <div class="groups-widget">
                        <div class="widget-title">О секции</div>
                        <div id="row-description" class="info-row" style="flex-wrap: wrap;">
                            <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditField('description', '${escapeHtml(currentSection.description || '').replace(/'/g, "\\'")}')"></i>
                            <span class="info-label" style="width: 100%; margin-bottom: 8px;">Описание</span>
                            <span class="info-value" style="width: 100%; font-size: 0.9rem; line-height: 1.5;">${escapeHtml(currentSection.description || 'Нет описания')}</span>
                        </div>
                    </div>
                    
                    <div class="groups-widget">
                        <div class="widget-title">Отзывы (${Math.floor(Math.random() * 30) + 10})</div>
                        <div class="review-item">
                            <div class="review-header">
                                <div class="review-avatar">АК</div>
                                <div><strong>Анна К.</strong> <span style="color:#ffb800;">★★★★★</span></div>
                            </div>
                            <p style="font-size: 0.8rem;">Отличный тренер! Ребёнок ходит с удовольствием, прогресс виден.</p>
                        </div>
                        <div class="review-item">
                            <div class="review-header">
                                <div class="review-avatar">ДМ</div>
                                <div><strong>Дмитрий М.</strong> <span style="color:#ffb800;">★★★★☆</span></div>
                            </div>
                            <p style="font-size: 0.8rem;">Хорошая атмосфера, но иногда многолюдно.</p>
                        </div>
                        <button class="btn-outline" style="margin-top: 16px; width: 100%;">Все отзывы →</button>
                    </div>
                </div>
            </div>
        `;
        
        // Заполняем группы
        const groupsContainer = document.getElementById('groupsContainer');
        if (groupsContainer) {
            if (groups.length === 0) {
                groupsContainer.innerHTML = '<div style="color: var(--text-gray); padding: 12px 0;">Группы не добавлены</div>';
            } else {
                groupsContainer.innerHTML = groups.map(group => `
                    <div class="group-item">
                        <div style="display: flex; align-items: center; flex: 1; gap: 12px;">
                            <span style="font-weight: 600; min-width: 130px;">${group.age_min || ''}${group.age_min ? '-' : ''}${group.age_max || ''} лет</span>
                            <div id="group-${group.id}-schedule" style="display: flex; align-items: center; gap: 6px;">
                                <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditGroup(${group.id}, 'schedule', '${escapeHtml(group.schedule || '').replace(/'/g, "\\'")}')"></i>
                                <span class="group-value">${escapeHtml(group.schedule || '—')}</span>
                            </div>
                            <div id="group-${group.id}-price" style="display: flex; align-items: center; gap: 6px; margin-left: auto;">
                                <i class="fas fa-pencil-alt edit-icon" onclick="window.startEditGroup(${group.id}, 'price', '${group.price || 0}')"></i>
                                <span class="group-value" style="font-weight: 700; color: var(--primary);">${group.price ? group.price + ' ₽' : '—'}</span>
                            </div>
                            <i class="fas fa-trash-alt edit-icon" style="color: #e57373;" onclick="window.deleteGroup(${group.id})"></i>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        document.getElementById('avatarInput')?.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) updateSectionAvatar(e.target.files[0]);
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Авторизация
    const modal = document.getElementById('authModal');
    const modalTitle = document.getElementById('modalTitle');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const modalActionBtn = document.getElementById('modalActionBtn');
    const switchAuthMode = document.getElementById('switchAuthMode');
    const modalError = document.getElementById('modalError');
    const closeModal = document.getElementById('closeModal');

    function openModal() { modal.classList.add('active'); modalError.textContent = ''; emailInput.value = ''; passwordInput.value = ''; }
    function closeModalFunc() { modal.classList.remove('active'); }
    function switchMode() {
        isLoginMode = !isLoginMode;
        modalTitle.textContent = isLoginMode ? 'Вход' : 'Регистрация';
        modalActionBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        switchAuthMode.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
        modalError.textContent = '';
    }

    async function handleAuth() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        if (!email || !password) { modalError.textContent = 'Заполните все поля'; return; }
        if (password.length < 6) { modalError.textContent = 'Пароль должен быть не менее 6 символов'; return; }
        try {
            if (isLoginMode) {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                updateAuthUI(true);
                closeModalFunc();
            } else {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;
                if (data.user) {
                    currentUser = data.user;
                    updateAuthUI(true);
                    closeModalFunc();
                    alert('Регистрация успешна!');
                }
            }
        } catch (err) { modalError.textContent = err.message; }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        currentUser = null;
        updateAuthUI(false);
    }

    function updateAuthUI(isLoggedIn) {
        const authSection = document.getElementById('authSection');
        if (isLoggedIn && currentUser) {
            authSection.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 0.85rem;">${escapeHtml(currentUser.email?.split('@')[0])}</span>
                    <a href="#" id="logoutBtn" class="btn-outline" style="padding: 6px 14px;">Выйти</a>
                </div>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        } else {
            authSection.innerHTML = '<a href="#" id="loginBtn" class="btn-outline">Войти</a>';
            document.getElementById('loginBtn')?.addEventListener('click', openModal);
        }
    }

    window.startEditField = startEditField;
    window.startEditGroup = startEditGroup;
    window.addGroup = addGroup;
    window.deleteGroup = deleteGroup;

    closeModal?.addEventListener('click', closeModalFunc);
    modalActionBtn?.addEventListener('click', handleAuth);
    switchAuthMode?.addEventListener('click', (e) => { e.preventDefault(); switchMode(); });
    window.addEventListener('click', (e) => { if (e.target === modal) closeModalFunc(); });

    checkSession();
</script>
</body>
</html>
